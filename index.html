<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#00d4ff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="JARVIS">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>J.A.R.V.I.S</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap');

:root {
  --cyan: #00d4ff;
  --cyan2: #0099bb;
  --orange: #ff6b00;
  --green: #00ff88;
  --dark: #010810;
  --dark2: #020c18;
  --panel: rgba(0,212,255,0.04);
  --border: rgba(0,212,255,0.15);
  --text: #b0dce8;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

html,body{
  height:100dvh;
  overflow:hidden;
  background:var(--dark);
  color:var(--text);
  font-family:'Rajdhani',sans-serif;
  user-select:none;
}

/* BG grid */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,212,255,0.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,212,255,0.025) 1px,transparent 1px);
  background-size:44px 44px;
  pointer-events:none;z-index:0;
}

/* Scanline */
.scanline{
  position:fixed;top:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(0,212,255,0.4),transparent);
  animation:scan 5s linear infinite;
  pointer-events:none;z-index:999;
}
@keyframes scan{from{top:-2px}to{top:100dvh}}

/* Corners */
.corner{position:fixed;width:18px;height:18px;z-index:998;pointer-events:none;}
.c-tl{top:6px;left:6px;border-top:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.c-tr{top:6px;right:6px;border-top:2px solid var(--cyan);border-right:2px solid var(--cyan);}
.c-bl{bottom:6px;left:6px;border-bottom:2px solid var(--cyan);border-left:2px solid var(--cyan);}
.c-br{bottom:6px;right:6px;border-bottom:2px solid var(--cyan);border-right:2px solid var(--cyan);}

/* ── HEADER ── */
header{
  position:relative;z-index:10;
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border);
  background:rgba(1,8,16,0.95);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:12px;
  flex-shrink:0;
}
.logo{
  width:40px;height:40px;border-radius:50%;
  border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;
  position:relative;flex-shrink:0;
  animation:spin 10s linear infinite;
}
.logo::before{
  content:'';position:absolute;inset:5px;border-radius:50%;
  border:1px solid var(--orange);
  animation:spin 5s linear infinite reverse;
}
.logo-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 12px var(--cyan);
  animation:pdot 2s ease-in-out infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pdot{0%,100%{box-shadow:0 0 6px var(--cyan)}50%{box-shadow:0 0 20px var(--cyan),0 0 40px rgba(0,212,255,0.3)}}

.hinfo{flex:1;min-width:0;}
.htitle{
  font-family:'Orbitron',monospace;font-size:14px;font-weight:900;
  color:var(--cyan);letter-spacing:4px;
  text-shadow:0 0 20px rgba(0,212,255,0.5);
}
.hsub{font-size:9px;color:var(--cyan2);letter-spacing:1.5px;opacity:0.6;margin-top:1px;}

.hstatus{display:flex;align-items:center;gap:5px;font-size:9px;letter-spacing:1px;color:var(--green);font-family:'Orbitron',monospace;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* ── TABS ── */
.tabs{
  display:flex;border-bottom:1px solid var(--border);
  background:rgba(1,8,16,0.9);flex-shrink:0;
  position:relative;z-index:10;
}
.tab{
  flex:1;padding:10px 4px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  font-family:'Orbitron',monospace;font-size:8px;letter-spacing:1px;
  color:rgba(0,212,255,0.35);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab svg{width:18px;height:18px;}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;overflow:hidden;position:relative;z-index:5;}
.screen.active{display:flex;}

/* ── CHAT ── */
#msgs{
  flex:1;overflow-y:auto;padding:14px 14px 8px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:2px;}
#msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.welcome{text-align:center;padding:24px 12px;animation:fadeIn 1s ease;}
.wtitle{
  font-family:'Orbitron',monospace;font-size:20px;font-weight:900;
  color:var(--cyan);letter-spacing:6px;
  text-shadow:0 0 30px rgba(0,212,255,0.6);margin-bottom:6px;
}
.wsub{font-size:11px;color:var(--cyan2);letter-spacing:2px;opacity:0.5;margin-bottom:20px;}
.sugs{display:flex;flex-direction:column;gap:7px;max-width:280px;margin:0 auto;}
.sug{
  background:var(--panel);border:1px solid var(--border);
  color:var(--text);padding:9px 12px;border-radius:6px;
  font-family:'Rajdhani',sans-serif;font-size:12px;letter-spacing:0.5px;
  cursor:pointer;text-align:left;transition:all 0.2s;
}
.sug:active{background:rgba(0,212,255,0.08);border-color:var(--cyan);color:var(--cyan);transform:translateX(4px);}

.bubble{display:flex;gap:8px;align-items:flex-start;animation:slideUp 0.3s ease;max-width:100%;}
.bubble.user{flex-direction:row-reverse;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.bav{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',monospace;font-size:8px;font-weight:700;
  flex-shrink:0;letter-spacing:0.5px;
}
.bubble.jarvis .bav{background:rgba(0,212,255,0.08);border:1px solid var(--cyan);color:var(--cyan);}
.bubble.user .bav{background:rgba(255,107,0,0.08);border:1px solid var(--orange);color:var(--orange);}

.bcont{
  max-width:calc(100% - 40px);padding:9px 12px;
  font-size:13px;line-height:1.6;letter-spacing:0.3px;
}
.bubble.jarvis .bcont{
  background:rgba(0,212,255,0.04);
  border:1px solid rgba(0,212,255,0.1);
  border-left:2px solid var(--cyan);
  border-radius:2px 10px 10px 10px;color:#c0e0ec;
}
.bubble.user .bcont{
  background:rgba(255,107,0,0.04);
  border:1px solid rgba(255,107,0,0.12);
  border-right:2px solid var(--orange);
  border-radius:10px 2px 10px 10px;color:#e8c8a8;
}

.typing{display:flex;gap:4px;align-items:center;padding:12px 14px;}
.tdot{width:5px;height:5px;border-radius:50%;background:var(--cyan);animation:tbounce 1.2s ease-in-out infinite;}
.tdot:nth-child(2){animation-delay:0.2s}
.tdot:nth-child(3){animation-delay:0.4s}
@keyframes tbounce{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-7px);opacity:1}}

/* Input */
.input-area{
  padding:10px 14px 14px;
  border-top:1px solid var(--border);
  background:rgba(1,8,16,0.95);
  backdrop-filter:blur(12px);flex-shrink:0;
}
.input-wrap{
  display:flex;gap:8px;align-items:flex-end;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:8px 10px;
  transition:border-color 0.2s;
}
.input-wrap:focus-within{border-color:var(--cyan);box-shadow:0 0 16px rgba(0,212,255,0.07);}
#userInput{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Rajdhani',sans-serif;
  font-size:14px;letter-spacing:0.5px;
  resize:none;max-height:80px;min-height:22px;line-height:1.5;
}
#userInput::placeholder{color:rgba(0,212,255,0.2);font-size:12px;letter-spacing:1px;}

.ibtn{
  width:34px;height:34px;border-radius:6px;border:none;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;flex-shrink:0;
}
.ibtn:active{transform:scale(0.9);}
#sendBtn{background:var(--cyan);}
#sendBtn:disabled{background:rgba(0,212,255,0.2);cursor:not-allowed;transform:none;}
#sendBtn svg{fill:var(--dark);}
#micBtn{background:rgba(0,212,255,0.08);border:1px solid var(--border);}
#micBtn svg{fill:var(--cyan);}
#micBtn.listening{background:rgba(255,0,80,0.15);border-color:rgba(255,0,80,0.5);animation:micpulse 0.8s ease-in-out infinite;}
#micBtn.listening svg{fill:#ff0050;}
@keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,0,80,0.4)}50%{box-shadow:0 0 0 8px rgba(255,0,80,0)}}

.ibtn svg{width:16px;height:16px;}

/* ── VOICE SCREEN ── */
.voice-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;
  padding:30px 20px;
}
.voice-orb{
  width:160px;height:160px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;cursor:pointer;
}
.orb-ring{
  position:absolute;border-radius:50%;border:2px solid var(--cyan);
  animation:orbpulse 2s ease-in-out infinite;
}
.orb-ring:nth-child(1){width:100%;height:100%;opacity:0.6;}
.orb-ring:nth-child(2){width:80%;height:80%;opacity:0.4;animation-delay:0.3s;}
.orb-ring:nth-child(3){width:60%;height:60%;opacity:0.2;animation-delay:0.6s;}
@keyframes orbpulse{0%,100%{transform:scale(1);opacity:0.6}50%{transform:scale(1.05);opacity:1}}
.orb-center{
  width:80px;height:80px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,0.3),rgba(0,212,255,0.05));
  border:2px solid var(--cyan);
  display:flex;align-items:center;justify-content:center;
  z-index:1;transition:all 0.3s;
}
.orb-center svg{width:32px;height:32px;fill:var(--cyan);}
.voice-orb.active .orb-center{
  background:radial-gradient(circle,rgba(255,0,80,0.3),rgba(255,0,80,0.05));
  border-color:#ff0050;box-shadow:0 0 30px rgba(255,0,80,0.3);
}
.voice-orb.active .orb-center svg{fill:#ff0050;}
.voice-orb.active .orb-ring{border-color:#ff0050;animation:orbpulse-fast 0.5s ease-in-out infinite;}
@keyframes orbpulse-fast{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

.voice-status{
  font-family:'Orbitron',monospace;font-size:11px;
  color:var(--cyan2);letter-spacing:3px;text-align:center;
}
.voice-transcript{
  min-height:60px;max-height:100px;overflow-y:auto;
  font-size:14px;color:var(--text);text-align:center;
  padding:0 20px;line-height:1.6;
}
.voice-response{
  flex:1;overflow-y:auto;width:100%;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:14px;
  font-size:13px;line-height:1.7;color:#c0e0ec;
  display:none;
}
.voice-response.show{display:block;}
.voice-hint{font-size:11px;color:rgba(0,212,255,0.3);letter-spacing:1px;text-align:center;}

/* ── CAMERA SCREEN ── */
.cam-screen{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:16px;gap:12px;overflow-y:auto;
}
#videoPreview{
  width:100%;max-width:400px;
  aspect-ratio:4/3;object-fit:cover;
  border:1px solid var(--border);border-radius:8px;
  background:#000;display:none;
}
#photoCanvas{display:none;}
.cam-controls{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.cam-btn{
  padding:10px 16px;border-radius:6px;border:none;
  font-family:'Orbitron',monospace;font-size:9px;letter-spacing:1px;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all 0.2s;
}
.cam-btn:active{transform:scale(0.95);}
.cam-btn.primary{background:var(--cyan);color:var(--dark);}
.cam-btn.secondary{background:var(--panel);border:1px solid var(--border);color:var(--cyan);}
.cam-btn svg{width:14px;height:14px;}
.cam-btn.primary svg{fill:var(--dark);}
.cam-btn.secondary svg{fill:var(--cyan);}

.cam-preview-wrap{
  width:100%;max-width:400px;position:relative;
}
#capturedImg{
  width:100%;border-radius:8px;
  border:1px solid var(--border);display:none;
}
.cam-result{
  width:100%;max-width:400px;
  background:var(--panel);border:1px solid var(--border);
  border-left:2px solid var(--cyan);border-radius:8px;
  padding:12px;font-size:13px;line-height:1.7;color:#c0e0ec;
  display:none;
}
.cam-result.show{display:block;animation:fadeIn 0.4s ease;}
.cam-prompt-wrap{
  width:100%;max-width:400px;
  display:flex;gap:8px;
}
#camPrompt{
  flex:1;background:var(--panel);border:1px solid var(--border);
  border-radius:6px;padding:9px 12px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:13px;
  outline:none;
}
#camPrompt::placeholder{color:rgba(0,212,255,0.25);font-size:12px;}
#camPrompt:focus{border-color:var(--cyan);}
.cam-placeholder{
  width:100%;max-width:400px;aspect-ratio:4/3;
  border:1px dashed var(--border);border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:rgba(0,212,255,0.3);
}
.cam-placeholder svg{width:48px;height:48px;fill:rgba(0,212,255,0.2);}
.cam-placeholder span{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;}

/* Shared */
pre{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-left:2px solid var(--cyan);padding:8px 10px;border-radius:4px;overflow-x:auto;font-size:11px;margin:5px 0;color:#8ecfdf;white-space:pre-wrap;word-break:break-word;}
code{background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.15);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--cyan);}
.loading-bar{width:100%;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-top:8px;}
.loading-bar-inner{height:100%;background:linear-gradient(90deg,transparent,var(--cyan),transparent);animation:loadbar 1.5s ease-in-out infinite;}
@keyframes loadbar{0%{transform:translateX(-100%)}100%{transform:translateX(300%)}}
</style>
</head>
<body>

<div class="scanline"></div>
<div class="corner c-tl"></div>
<div class="corner c-tr"></div>
<div class="corner c-bl"></div>
<div class="corner c-br"></div>

<!-- HEADER -->
<header>
  <div class="logo"><div class="logo-dot"></div></div>
  <div class="hinfo">
    <div class="htitle">J.A.R.V.I.S</div>
    <div class="hsub">SISTEMA DE ASISTENCIA AVANZADA</div>
  </div>
  <div class="hstatus"><div class="sdot"></div>ONLINE</div>
</header>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('chat',this)" id="tab-chat">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    CHAT
  </div>
  <div class="tab" onclick="switchTab('voice',this)" id="tab-voice">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6.91 6c-.49 0-.9.36-.98.85C16.52 15.2 14.47 17 12 17s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
    VOZ
  </div>
  <div class="tab" onclick="switchTab('cam',this)" id="tab-cam">
    <svg viewBox="0 0 24 24"><path fill="currentColor" d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M12 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m6-3.5-.9 2H17c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H7c-1.1 0-2-.9-2-2V7.5c0-1.1.9-2 2-2h1.1L7.2 3.5H12l-1 2h2zm0 0"/></svg>
    CÁMARA
  </div>
</div>

<!-- CHAT SCREEN -->
<div class="screen active" id="screen-chat">
  <div id="msgs">
    <div class="welcome" id="welcome">
      <div class="wtitle">JARVIS</div>
      <div class="wsub">ESPERANDO INSTRUCCIONES</div>
      <div class="sugs">
        <div class="sug" onclick="suggest(this)">⚡ ¿Qué podés hacer?</div>
        <div class="sug" onclick="suggest(this)">🐍 Explicame listas en Python</div>
        <div class="sug" onclick="suggest(this)">🧮 Resolvé: 3x² - 12 = 0</div>
        <div class="sug" onclick="suggest(this)">📊 ¿Cómo uso pandas para filtrar?</div>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <button class="ibtn" id="micBtn" onclick="toggleMicChat()">
        <svg viewBox="0 0 24 24"><path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6.91 6c-.49 0-.9.36-.98.85C16.52 15.2 14.47 17 12 17s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
      </button>
      <textarea id="userInput" placeholder="Ingresá tu comando..." rows="1"></textarea>
      <button class="ibtn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- VOICE SCREEN -->
<div class="screen" id="screen-voice">
  <div class="voice-screen">
    <div class="voice-orb" id="voiceOrb" onclick="toggleVoice()">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-center">
        <svg viewBox="0 0 24 24"><path d="M12 15c1.66 0 3-1.34 3-3V6c0-1.66-1.34-3-3-3S9 4.34 9 6v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V6zm6.91 6c-.49 0-.9.36-.98.85C16.52 15.2 14.47 17 12 17s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V21c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/></svg>
      </div>
    </div>
    <div class="voice-status" id="voiceStatus">TOCÁ PARA HABLAR</div>
    <div class="voice-transcript" id="voiceTranscript"></div>
    <div class="voice-response" id="voiceResponse"></div>
    <div class="voice-hint">RECONOCIMIENTO DE VOZ ACTIVADO</div>
  </div>
</div>

<!-- CAMERA SCREEN -->
<div class="screen" id="screen-cam">
  <div class="cam-screen">
    <div class="cam-placeholder" id="camPlaceholder">
      <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M12 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m6-3.5-.9 2H17c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H7c-1.1 0-2-.9-2-2V7.5c0-1.1.9-2 2-2h1.1L7.2 3.5H12l-1 2h2zm0 0"/></svg>
      <span>CÁMARA INACTIVA</span>
    </div>
    <video id="videoPreview" autoplay playsinline muted></video>
    <canvas id="photoCanvas"></canvas>
    <div class="cam-preview-wrap">
      <img id="capturedImg" alt="Captura">
    </div>
    <div class="cam-controls">
      <button class="cam-btn primary" onclick="startCamera()">
        <svg viewBox="0 0 24 24"><path d="M12 15.2A3.2 3.2 0 0 1 8.8 12 3.2 3.2 0 0 1 12 8.8 3.2 3.2 0 0 1 15.2 12 3.2 3.2 0 0 1 12 15.2M12 7a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m6-3.5-.9 2H17c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H7c-1.1 0-2-.9-2-2V7.5c0-1.1.9-2 2-2h1.1L7.2 3.5H12l-1 2h2zm0 0"/></svg>
        ACTIVAR
      </button>
      <button class="cam-btn secondary" onclick="takePhoto()">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8" fill="currentColor"/></svg>
        CAPTURAR
      </button>
      <button class="cam-btn secondary" onclick="uploadPhoto()">
        <svg viewBox="0 0 24 24"><path fill="currentColor" d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
        SUBIR
      </button>
    </div>
    <div class="cam-prompt-wrap">
      <input type="text" id="camPrompt" placeholder="¿Qué querés saber de la imagen?" />
      <button class="cam-btn primary" onclick="analyzePhoto()" style="padding:9px 12px;">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;"><path fill="var(--dark)" d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.516 6.516 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5z"/></svg>
      </button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(event)">
    <div class="cam-result" id="camResult"></div>
  </div>
</div>

<script>
// ── STATE ──
const history = [];
let recognition = null;
let voiceActive = false;
let cameraStream = null;

const SYSTEM = `Sos J.A.R.V.I.S, un asistente IA avanzado y preciso.
Respondé de forma inteligente, concisa y levemente formal.
Para código usá bloques markdown. Sé didáctico con temas técnicos.
Cuando analices imágenes, describí con detalle lo que ves y respondé la pregunta del usuario.`;

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  el.classList.add('active');
  if (name !== 'cam' && cameraStream) stopCamera();
}

// ── CHAT ──
const msgsEl = document.getElementById('msgs');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function suggest(el) {
  inputEl.value = el.textContent.replace(/^[\s\S]{2}\s/, '');
  sendMessage();
}

function addBubble(role, text) {
  document.getElementById('welcome')?.remove();
  const b = document.createElement('div');
  b.className = 'bubble ' + (role === 'user' ? 'user' : 'jarvis');
  const av = document.createElement('div');
  av.className = 'bav';
  av.textContent = role === 'user' ? 'VOS' : 'JAR';
  const bc = document.createElement('div');
  bc.className = 'bcont';
  bc.innerHTML = fmt(text);
  b.appendChild(av); b.appendChild(bc);
  msgsEl.appendChild(b);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const b = document.createElement('div');
  b.className = 'bubble jarvis'; b.id = 'typing';
  b.innerHTML = `<div class="bav">JAR</div><div class="bcont"><div class="typing"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div></div>`;
  msgsEl.appendChild(b);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}
function removeTyping() { document.getElementById('typing')?.remove(); }

async function sendMessage() {
  const txt = inputEl.value.trim();
  if (!txt || sendBtn.disabled) return;
  inputEl.value = ''; inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  addBubble('user', txt);
  history.push({ role: 'user', content: txt });
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: history })
    });
    const data = await res.json();
    removeTyping();
    const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
    history.push({ role: 'assistant', content: reply });
    addBubble('jarvis', reply);
  } catch {
    removeTyping();
    addBubble('jarvis', '⚠️ Error de conexión.');
  }
  sendBtn.disabled = false;
}

// ── MIC IN CHAT ──
function toggleMicChat() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Tu navegador no soporta reconocimiento de voz. Usá Chrome.'); return;
  }
  const btn = document.getElementById('micBtn');
  if (btn.classList.contains('listening')) {
    recognition?.stop(); btn.classList.remove('listening'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-AR'; recognition.interimResults = false;
  recognition.onresult = e => {
    inputEl.value = e.results[0][0].transcript;
    btn.classList.remove('listening');
    sendMessage();
  };
  recognition.onerror = () => btn.classList.remove('listening');
  recognition.onend = () => btn.classList.remove('listening');
  recognition.start();
  btn.classList.add('listening');
}

// ── VOICE SCREEN ──
function toggleVoice() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('Reconocimiento de voz no disponible. Usá Chrome.'); return;
  }
  if (voiceActive) { recognition?.stop(); return; }
  const orb = document.getElementById('voiceOrb');
  const status = document.getElementById('voiceStatus');
  const transcript = document.getElementById('voiceTranscript');
  const responseEl = document.getElementById('voiceResponse');

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'es-AR'; recognition.interimResults = true;

  recognition.onstart = () => {
    voiceActive = true; orb.classList.add('active');
    status.textContent = 'ESCUCHANDO...';
    transcript.textContent = ''; responseEl.classList.remove('show');
  };
  recognition.onresult = e => {
    const t = Array.from(e.results).map(r => r[0].transcript).join('');
    transcript.textContent = t;
  };
  recognition.onend = async () => {
    voiceActive = false; orb.classList.remove('active');
    const txt = transcript.textContent.trim();
    if (!txt) { status.textContent = 'TOCÁ PARA HABLAR'; return; }
    status.textContent = 'PROCESANDO...';
    responseEl.innerHTML = '<div class="loading-bar"><div class="loading-bar-inner"></div></div>';
    responseEl.classList.add('show');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM, messages: [{ role: 'user', content: txt }] })
      });
      const data = await res.json();
      const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      responseEl.innerHTML = fmt(reply);
      status.textContent = 'RESPUESTA LISTA';
      speak(reply.replace(/<[^>]+>/g, '').substring(0, 300));
    } catch {
      responseEl.innerHTML = '⚠️ Error de conexión.';
      status.textContent = 'ERROR';
    }
  };
  recognition.onerror = () => { voiceActive = false; orb.classList.remove('active'); status.textContent = 'ERROR - TOCÁ PARA REINTENTAR'; };
  recognition.start();
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-AR'; u.rate = 1.05; u.pitch = 0.9;
  window.speechSynthesis.speak(u);
}

// ── CAMERA ──
async function startCamera() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    const vid = document.getElementById('videoPreview');
    vid.srcObject = cameraStream; vid.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
  } catch { alert('No se pudo acceder a la cámara. Verificá los permisos.'); }
}

function stopCamera() {
  cameraStream?.getTracks().forEach(t => t.stop());
  cameraStream = null;
  document.getElementById('videoPreview').style.display = 'none';
  document.getElementById('camPlaceholder').style.display = 'flex';
}

function takePhoto() {
  const vid = document.getElementById('videoPreview');
  if (!cameraStream) { alert('Primero activá la cámara.'); return; }
  const canvas = document.getElementById('photoCanvas');
  canvas.width = vid.videoWidth; canvas.height = vid.videoHeight;
  canvas.getContext('2d').drawImage(vid, 0, 0);
  const img = document.getElementById('capturedImg');
  img.src = canvas.toDataURL('image/jpeg', 0.85);
  img.style.display = 'block';
  stopCamera();
}

function uploadPhoto() {
  document.getElementById('fileInput').click();
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('capturedImg');
    img.src = ev.target.result; img.style.display = 'block';
    document.getElementById('camPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function analyzePhoto() {
  const img = document.getElementById('capturedImg');
  if (!img.src || img.style.display === 'none') { alert('Primero capturá o subí una imagen.'); return; }
  const prompt = document.getElementById('camPrompt').value.trim() || '¿Qué ves en esta imagen? Describí con detalle.';
  const resultEl = document.getElementById('camResult');
  resultEl.innerHTML = '<div class="loading-bar"><div class="loading-bar-inner"></div></div>';
  resultEl.classList.add('show');
  // Convert to base64
  const base64 = img.src.split(',')[1];
  const mediaType = img.src.startsWith('data:image/png') ? 'image/png' : 'image/jpeg';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 1000, system: SYSTEM,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });
    const data = await res.json();
    const reply = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
    resultEl.innerHTML = fmt(reply);
  } catch {
    resultEl.innerHTML = '⚠️ Error al analizar la imagen.';
  }
}

// ── FORMAT ──
function fmt(text) {
  text = text.replace(/```(\w+)?\n?([\s\S]*?)```/g, (_, l, c) => `<pre>${esc(c.trim())}</pre>`);
  text = text.replace(/`([^`]+)`/g, (_, c) => `<code>${esc(c)}</code>`);
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
